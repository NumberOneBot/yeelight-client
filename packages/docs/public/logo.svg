<svg xmlns="http://www.w3.org/2000/svg" viewBox="-90 -110 580 580" width="580" height="580">

  <style>
    :root { color: #111111; }
    .bg { fill: #ffffff; }
    @media (prefers-color-scheme: dark) {
      :root { color: #F0EAD6; }
      .bg { fill: transparent; }
    }
  </style>

  <!-- White background circle (transparent in dark mode) -->
  <circle class="bg" cx="200" cy="180" r="280"/>

  <!-- Floating dots above the bulb (6, spread wide) -->
  <circle cx="60"  cy="65"  r="16" fill="#EC407A" opacity="0.5"/>
  <circle cx="95"  cy="-9"  r="15" fill="#FFA726" opacity="0.85"/>
  <circle cx="188" cy="-38" r="18" fill="#FFCA28" opacity="0.85"/>
  <circle cx="261" cy="-45" r="17" fill="#EF5350" opacity="0.85"/>
  <circle cx="325" cy="8"   r="16" fill="#AB47BC" opacity="0.85"/>
  <circle cx="362" cy="78"  r="14" fill="#29B6F6" opacity="0.85"/>

  <!-- Coloured circles inside the bulb -->
  <g>
    <circle cx="172" cy="154" r="80" fill="#EF5350" opacity="0.75"/>
    <circle cx="228" cy="154" r="80" fill="#FF7043" opacity="0.7"/>
    <circle cx="200" cy="114" r="75" fill="#FFCA28" opacity="0.7"/>
    <circle cx="153" cy="198" r="70" fill="#66BB6A" opacity="0.7"/>
    <circle cx="247" cy="198" r="70" fill="#29B6F6" opacity="0.7"/>
    <circle cx="200" cy="230" r="65" fill="#AB47BC" opacity="0.45"/>
    <circle cx="200" cy="167" r="45" fill="#FFEB3B" opacity="0.65"/>
  </g>

  <!-- Bulb outline -->
  <path d="
    M133,325
    C133,310 125,295 110,280
    C85,255 60,220 60,170
    C60,90 120,30 200,30
    C280,30 340,90 340,170
    C340,220 315,255 290,280
    C275,295 267,310 267,325
  " fill="none" stroke="currentColor" stroke-width="18" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Thread bands (all same width, no taper) -->
  <rect x="137" y="342" width="127" height="18" rx="9" fill="currentColor"/>
  <rect x="137" y="368" width="127" height="18" rx="9" fill="currentColor"/>
  <rect x="137" y="394" width="127" height="18" rx="9" fill="currentColor"/>

  <!-- Bottom cap (socket contact — narrower) -->
  <rect x="160" y="420" width="80" height="18" rx="9" fill="currentColor"/>
</svg>
